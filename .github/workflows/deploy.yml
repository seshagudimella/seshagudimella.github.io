name: Build & Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger a deploy manually from GitHub

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portfolio-react/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: portfolio-react

      - name: Build
        run: npm run build
        working-directory: portfolio-react

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./portfolio-react/dist
          publish_branch: gh-pages
          force_orphan: true
